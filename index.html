<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD AI V1.8 - PRO</title>
    <style>
        body { margin: 0; background: #05070f; font-family: 'Courier New', monospace; overflow: hidden; color: #00f0ff; }
        canvas { position: fixed; top: 0; left: 0; opacity: 0.15; z-index: 0; }
        #wrap { position: relative; z-index: 2; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { width: 92%; max-width: 650px; height: 82vh; background: rgba(10, 15, 30, 0.95); border: 1px solid #00f0ff; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 0 25px rgba(0, 240, 255, 0.15); }
        #screen { flex: 1; padding: 20px; overflow-y: auto; font-size: 14px; scrollbar-width: thin; scrollbar-color: #00f0ff #0a0f1f; }
        #screen::-webkit-scrollbar { width: 4px; }
        #screen::-webkit-scrollbar-thumb { background: #00f0ff; }
        .line { margin: 10px 0; line-height: 1.5; white-space: pre-wrap; }
        .user { color: #6aa6ff; font-weight: bold; }
        .ai { color: #00f0ff; }
        .sys { color: #ff4d6d; font-style: italic; }
        .stat-box { border: 1px dashed #00f0ff; padding: 10px; margin: 10px 0; background: rgba(0, 240, 255, 0.05); }
        .bottom { display: flex; border-top: 1px solid #00f0ff33; background: #0a0f1f; border-radius: 0 0 12px 12px; }
        input { flex: 1; padding: 18px; background: transparent; border: none; color: #00f0ff; outline: none; font-family: inherit; font-size: 15px; }
        button { width: 110px; background: #00f0ff; border: none; color: #05070f; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #6aa6ff; box-shadow: 0 0 10px #6aa6ff; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="wrap">
    <div class="box">
        <div id="screen">
            <div class="line sys">>> SYSTEM: AHMAD AI V1.8 ONLINE</div>
            <div class="line sys">>> TYPE 'help' FOR COMMANDS...</div>
        </div>
        <div class="bottom">
            <input id="input" placeholder="Type here..." autocomplete="off">
            <button id="sendBtn">SEND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 1. التكوين (Firebase & Gemini)
const firebaseConfig = {
  apiKey: "AIzaSyChfStXSUt7iazC3RlF0fKF9H4Mr_BBbBM",
  authDomain: "ahmadai-9afeb.firebaseapp.com",
  projectId: "ahmadai-9afeb",
  storageBucket: "ahmadai-9afeb.firebasestorage.app",
  messagingSenderId: "893222793843",
  appId: "1:893222793843:web:f436a84b54847f8203b006"
};
const GEMINI_KEY = "AIzaSyB2TxclBoJPg3Sspl0kSepVPt5k8loODtY";

// تهيئة Firebase
let db;
let statsDoc;
try {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    statsDoc = doc(db, "system", "v1");
} catch(e) { console.error("Firebase Connect Error"); }

// 2. تتبع الزوار عند التحميل
async function trackVisit() {
    if (!db) return;
    try {
        const snap = await getDoc(statsDoc);
        if (!snap.exists()) {
            await setDoc(statsDoc, { visitors: 1, messages: 0, countries: {} });
        } else {
            await updateDoc(statsDoc, { visitors: increment(1) });
        }
        
        fetch("https://ipapi.co/json/").then(r => r.json()).then(async data => {
            const country = data.country_name || "Unknown";
            const s = await getDoc(statsDoc);
            let cList = s.data().countries || {};
            cList[country] = (cList[country] || 0) + 1;
            await updateDoc(statsDoc, { countries: cList });
        }).catch(()=>{});
    } catch(e) { console.log("Firebase Rules restricted visit tracking."); }
}
trackVisit();

// 3. دالة الإرسال والرد
async function send() {
    const input = document.getElementById("input");
    const screen = document.getElementById("screen");
    const text = input.value.trim();

    if (!text) return;

    // عرض رسالة المستخدم
    screen.innerHTML += `<div class="line user">> YOU: ${text}</div>`;
    input.value = "";
    autoScroll();

    // محاولة تحديث عدد الرسائل في Firebase
    if(db) updateDoc(statsDoc, { messages: increment(1) }).catch(()=>{});

    const cmd = text.toLowerCase();

    // فحص الأوامر أولاً
    if (cmd === "help") return addAiLine("Commands:\n- get info: View stats\n- clear: Clear screen\n- owner: Developer\n- system: Core status");
    if (cmd === "clear") { screen.innerHTML = ""; return; }
    if (cmd === "owner") return addAiLine("Project Owner: AHMAD ALMUTAIRI");
    if (cmd === "system") return addAiLine("V1.8 QUANTUM CORE | Status: Optimal");
    
    if (cmd === "get info") {
        if (!db) return addAiLine("Error: Database not connected.");
        try {
            const snap = await getDoc(statsDoc);
            const d = snap.data();
            let countries = Object.entries(d.countries || {}).map(([n, c]) => `• ${n}: ${c}`).join("\n");
            return addAiLine(`<div class="stat-box">SYSTEM REPORT:\nVisitors: ${d.visitors}\nMessages: ${d.messages}\nLocations:\n${countries || "None"}</div>`);
        } catch(e) { return addAiLine("Access Denied: Check Firebase Rules."); }
    }

    // إذا لم يكن أمراً، إرسال إلى Gemini
    const aiLine = createAiLine();
    aiLine.innerHTML = "AI: [Thinking...]";
    autoScroll();

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: text + " (أجب باختصار شديد وبأسلوب نظام تقني)" }] }]
            })
        });
        const data = await response.json();
        const aiMsg = data.candidates[0].content.parts[0].text;
        aiLine.innerHTML = "AI: ";
        typeEffect(aiLine, aiMsg, 20);
    } catch (err) {
        aiLine.innerHTML = "AI: Error - Connection failed. Check API Key.";
    }
}

// ربط الأزرار
document.getElementById("sendBtn").addEventListener("click", send);
document.getElementById("input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});

// أدوات مساعدة
function createAiLine() {
    const div = document.createElement("div");
    div.className = "line ai";
    document.getElementById("screen").appendChild(div);
    return div;
}

function addAiLine(html) {
    const line = createAiLine();
    line.innerHTML = "AI: " + html;
    autoScroll();
}

function typeEffect(el, text, speed) {
    let i = 0;
    function run() {
        if (i < text.length) {
            el.innerHTML += text[i]; i++;
            setTimeout(run, speed);
            autoScroll();
        }
    }
    run();
}

function autoScroll() {
    const s = document.getElementById("screen");
    s.scrollTop = s.scrollHeight;
}
</script>

<script>
// Matrix Effect
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let fontSize = 14;
let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
function draw() {
    ctx.fillStyle = "rgba(5, 7, 15, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00f0ff"; ctx.font = fontSize + "px monospace";
    drops.forEach((y, i) => {
        const char = "01"[Math.floor(Math.random()*2)];
        ctx.fillText(char, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(draw, 35);
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>

</body>
</html>
