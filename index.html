const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const stats = doc(db,"system","global");

await setDoc(stats,{visitors:0,messages:0,countries:{}},{merge:true});

async function visit(){
  await updateDoc(stats,{visitors:increment(1)});

  try{
    let g=await fetch("https://ipapi.co/json/");
    let d=await g.json();

    let snap=await getDoc(stats);
    let data=snap.data();

    let c=data.countries||{};
    c[d.country_name||"Unknown"]=(c[d.country_name||"Unknown"]||0)+1;

    await updateDoc(stats,{countries:c});
  }catch{}
}
visit();

  let input=document.getElementById("input");
  let screen=document.getElementById("screen");

  let text=input.value.trim();
  if(!text) return;

  screen.innerHTML+=`<div class="line user">YOU: ${text}</div>`;

  await updateDoc(stats,{messages:increment(1)});

  /* ADMIN MODE */
  if(text==="ahmad"){
    let pass=prompt("Admin Password:");
    if(pass!=="A2026") return alert("Wrong password");

    let snap=await getDoc(stats);
    let d=snap.data();

    screen.innerHTML+=`
      <div class="admin">
      <h3>ADMIN CONSOLE</h3>
      Visitors: ${d.visitors}<br>
      Messages: ${d.messages}<br>
      Countries:<br>
      ${Object.entries(d.countries||{}).map(([k,v])=>k+" : "+v).join("<br>")}
      </div>
    `;
    return;
  }

  let reply="Processing neural input...";

  if(text.includes("time")) reply=new Date().toLocaleTimeString();

  else if(text.includes("owner")) reply="AHMAD ALMUTAIRI";
  else if(text.includes("system")) reply="All systems stable";

  screen.innerHTML+=`<div class="line ai">AI: ${reply}</div>`;
