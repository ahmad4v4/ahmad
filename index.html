<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD AI V1 - Terminal</title>
    <style>
        body {
            margin: 0;
            background: #05070f;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #00f0ff;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            opacity: 0.15;
            z-index: 0;
        }

        #wrap {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 92%;
            max-width: 650px;
            height: 82vh;
            background: rgba(10, 15, 30, 0.95);
            border: 1px solid #00f0ff;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.15);
        }

        #screen {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 14px;
            scrollbar-width: thin;
            scrollbar-color: #00f0ff #0a0f1f;
        }

        #screen::-webkit-scrollbar { width: 4px; }
        #screen::-webkit-scrollbar-thumb { background: #00f0ff; }

        .line { margin: 10px 0; line-height: 1.5; white-space: pre-wrap; }
        .user { color: #6aa6ff; font-weight: bold; }
        .ai { color: #00f0ff; }
        .sys { color: #ff4d6d; font-style: italic; }
        .stat-box { 
            border: 1px dashed #00f0ff; 
            padding: 10px; 
            margin: 10px 0; 
            background: rgba(0, 240, 255, 0.05);
        }

        .bottom {
            display: flex;
            border-top: 1px solid #00f0ff33;
            background: #0a0f1f;
            border-radius: 0 0 12px 12px;
        }

        input {
            flex: 1;
            padding: 18px;
            background: transparent;
            border: none;
            color: #00f0ff;
            outline: none;
            font-family: inherit;
            font-size: 15px;
        }

        button {
            width: 110px;
            background: #00f0ff;
            border: none;
            color: #05070f;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        button:hover { background: #6aa6ff; box-shadow: 0 0 10px #6aa6ff; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="wrap">
    <div class="box">
        <div id="screen">
            <div class="line sys">>> SYSTEM: AHMAD AI V1.5 ONLINE</div>
            <div class="line sys">>> STATUS: ALL CORES OPERATIONAL</div>
            <div class="line sys">>> TYPE 'help' TO START...</div>
        </div>
        <div class="bottom">
            <input id="input" placeholder="Enter command or chat..." autocomplete="off">
            <button onclick="send()">SEND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// --- CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyChfStXSUt7iazC3RlF0fKF9H4Mr_BBbBM",
  authDomain: "ahmadai-9afeb.firebaseapp.com",
  projectId: "ahmadai-9afeb",
  storageBucket: "ahmadai-9afeb.firebasestorage.app",
  messagingSenderId: "893222793843",
  appId: "1:893222793843:web:f436a84b54847f8203b006"
};

const GEMINI_API_KEY = "AIzaSyB2TxclBoJPg3Sspl0kSepVPt5k8loODtY"; 

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const statsDoc = doc(db, "system", "v1");

// 1. Visitor Tracking (Runs on Load)
async function initSystem() {
    try {
        await setDoc(statsDoc, { visitors: increment(1) }, { merge: true });
        
        // Location Tracking
        const res = await fetch("https://ipapi.co/json/");
        const ipData = await res.json();
        const country = ipData.country_name || "Unknown";
        
        const snap = await getDoc(statsDoc);
        let countries = snap.data().countries || {};
        countries[country] = (countries[country] || 0) + 1;
        
        await updateDoc(statsDoc, { countries: countries });
    } catch (e) { console.warn("Firebase Init Error"); }
}
initSystem();

// 2. Main Logic
window.send = async function() {
    const input = document.getElementById("input");
    const screen = document.getElementById("screen");
    const text = input.value.trim();

    if (!text) return;

    // Show User Text
    screen.innerHTML += `<div class="line user">> USER: ${text}</div>`;
    input.value = "";
    autoScroll();

    // Command Handling
    const cmd = text.toLowerCase();

    // FIREBASE UPDATE
    try { await updateDoc(statsDoc, { messages: increment(1) }); } catch(e){}

    // Internal Commands
    if (cmd === "clear") { screen.innerHTML = ""; return; }
    if (cmd === "help") { 
        addAiLine("Core Commands: \n- get info: Display system statistics\n- system: Core status\n- owner: Developer info\n- clear: Purge screen\n- time: Local system time");
        return;
    }
    if (cmd === "time") { addAiLine(new Date().toLocaleString()); return; }
    if (cmd === "owner") { addAiLine("Project Architect: AHMAD ALMUTAIRI."); return; }
    if (cmd === "system") { addAiLine("V1.5 QUANTUM CORE | GEN: GEMINI FLASH | LATENCY: OPTIMAL"); return; }

    // GET INFO COMMAND (STATISTICS)
    if (cmd === "get info") {
        const snap = await getDoc(statsDoc);
        const d = snap.data();
        let countryList = Object.entries(d.countries || {})
            .map(([name, count]) => `  • ${name}: ${count}`)
            .join("\n");

        const statsHtml = `
<div class="stat-box">
[ SYSTEM DATA REPORT ]
-----------------------
TOTAL VISITORS : ${d.visitors}
TOTAL MESSAGES : ${d.messages}

BY LOCATION:
${countryList || "  No location data."}
-----------------------
</div>`;
        addAiLine(statsHtml);
        return;
    }

    // AI GEMINI CALL
    const aiLine = createAiLine();
    aiLine.innerHTML = "AI: [Analysing Network...]";
    
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: text + " (أجب باختصار شديد وبأسلوب نظام تقني ذكي)" }] }]
            })
        });
        const data = await response.json();
        const aiMsg = data.candidates[0].content.parts[0].text;
        
        aiLine.innerHTML = "AI: ";
        typeEffect(aiLine, aiMsg, 20);
    } catch (err) {
        aiLine.innerHTML = "AI: ERROR - NEURAL LINK FAILED.";
    }
}

// Helpers
function createAiLine() {
    const screen = document.getElementById("screen");
    const div = document.createElement("div");
    div.className = "line ai";
    screen.appendChild(div);
    return div;
}

function addAiLine(html) {
    const line = createAiLine();
    line.innerHTML = "AI: " + html;
    autoScroll();
}

function typeEffect(el, text, speed) {
    let i = 0;
    function run() {
        if (i < text.length) {
            el.innerHTML += text[i];
            i++;
            setTimeout(run, speed);
            autoScroll();
        }
    }
    run();
}

function autoScroll() {
    const screen = document.getElementById("screen");
    screen.scrollTop = screen.scrollHeight;
}

document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

<script>
// Matrix Background Animation
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let chars = "0101AHMADAI@#$%&*".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(5, 7, 15, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00f0ff";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(draw, 35);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
