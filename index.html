<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AHMAD AI V1</title>

<style>
body{
  margin:0;
  background:#05070f;
  font-family:monospace;
  overflow:hidden;
  color:#00f0ff;
}

canvas{
  position:fixed;
  top:0;left:0;
  opacity:0.15;
  z-index:0;
}

#wrap{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:92%;
  max-width:540px;
  height:78vh;
  background:rgba(10,15,30,0.95);
  border:1px solid #00f0ff;
  border-radius:14px;
  display:flex;
  flex-direction:column;
}

#screen{
  flex:1;
  padding:10px;
  overflow:auto;
  font-size:13px;
}

.line{margin:6px 0}
.user{color:#6aa6ff}
.ai{color:#00f0ff}
.sys{color:#ff4d6d}

.bottom{
  display:flex;
  border-top:1px solid #00f0ff33;
}

input{
  flex:1;
  padding:12px;
  background:#0a0f1f;
  border:none;
  color:#00f0ff;
  outline:none;
}

button{
  width:90px;
  background:#00f0ff;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="wrap">
  <div class="box">

    <div id="screen">
      <div class="line sys">SYSTEM ONLINE • AHMAD AI V1</div>
      <div class="line sys">type: help</div>
    </div>

    <div class="bottom">
      <input id="input" placeholder="Enter command...">
      <button onclick="send()">SEND</button>
    </div>

  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChfStXSUt7iazC3RlF0fKF9H4Mr_BBbBM",
  authDomain: "ahmadai-9afeb.firebaseapp.com",
  projectId: "ahmadai-9afeb",
  storageBucket: "ahmadai-9afeb.firebasestorage.app",
  messagingSenderId: "893222793843",
  appId: "1:893222793843:web:f436a84b54847f8203b006"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const stats = doc(db,"system","v1");

await setDoc(stats,{
  visitors:0,
  messages:0,
  countries:{}
},{merge:true});

/* VISIT */
async function visit(){
  await updateDoc(stats,{visitors:increment(1)});

  try{
    let g=await fetch("https://ipapi.co/json/");
    let d=await g.json();

    let snap=await getDoc(stats);
    let data=snap.data();

    let c=data.countries||{};
    c[d.country_name||"Unknown"]=(c[d.country_name||"Unknown"]||0)+1;

    await updateDoc(stats,{countries:c});
  }catch{}
}
visit();

/* SEND GLOBAL */
window.send = async function(){

  let input=document.getElementById("input");
  let screen=document.getElementById("screen");

  let text=input.value.trim();
  if(!text) return;

  screen.innerHTML += `<div class="line user">YOU: ${text}</div>`;
  input.value="";

  await updateDoc(stats,{messages:increment(1)});

  /* ADMIN ENTRY */
  if(text==="admin v1"){
    let pass = prompt("Enter password:");
    if(pass!=="1") return alert("Denied");

    let snap=await getDoc(stats);
    let d=snap.data();

    screen.innerHTML += `
      <div class="line sys">
      --- ADMIN PANEL V1 ---
      <br>Visitors: ${d.visitors}
      <br>Messages: ${d.messages}
      <br>Countries:<br>
      ${Object.entries(d.countries||{}).map(([k,v])=>k+" : "+v).join("<br>")}
      </div>
    `;
    return;
  }

  let reply = ai(text);

  let box=document.createElement("div");
  box.className="line ai";
  box.innerHTML="AI: ";
  screen.appendChild(box);

  type(box,reply,15);
};

/* ENTER */
document.addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

/* AI */
function ai(t){
  t=t.toLowerCase();

  if(t==="help") return "time / date / system / owner / clear";
  if(t==="time") return new Date().toLocaleTimeString();
  if(t==="date") return new Date().toLocaleDateString();
  if(t==="system") return "V1 CORE ONLINE";
  if(t==="owner") return "AHMAD ALMUTAIRI";
  if(t==="clear"){ document.getElementById("screen").innerHTML=""; return ""; }

  let r=[
    "processing input...",
    "analyzing data...",
    "command accepted...",
    "neural response generated..."
  ];

  return r[Math.floor(Math.random()*r.length)];
}

/* typing animation */
function type(el,text,speed){
  let i=0;
  function run(){
    if(i<text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(run,speed);
    }
  }
  run();
}
</script>

<!-- MATRIX -->
<script>
const c=document.getElementById("matrix");
const x=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let chars="01AHMADAI#$%".split("");
let font=14;
let cols=c.width/font;
let drops=[];
for(let i=0;i<cols;i++)drops[i]=1;

function draw(){
  x.fillStyle="rgba(0,0,0,0.05)";
  x.fillRect(0,0,c.width,c.height);
  x.fillStyle="#00f0ff";
  x.font=font+"px monospace";

  for(let i=0;i<drops.length;i++){
    let t=chars[Math.floor(Math.random()*chars.length)];
    x.fillText(t,i*font,drops[i]*font);

    if(drops[i]*font>c.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(draw,30);
</script>

</body>
</html>
