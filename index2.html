<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AHMAD AI V3</title>

<style>
body{
  margin:0;
  background:black;
  font-family:monospace;
  color:#00f0ff;
  overflow:hidden;
}
canvas{
  position:fixed;
  top:0;left:0;
  z-index:0;
  opacity:0.3;
}
#panel{
  position:relative;
  z-index:2;
  padding:10px;
}
#screen{
  height:75vh;
  overflow:auto;
  background:rgba(0,0,0,0.8);
  padding:10px;
  border:1px solid #00f0ff;
}
input{
  width:80%;
  padding:10px;
  background:#111;
  border:none;
  color:#00f0ff;
}
button{
  padding:10px;
  background:#00f0ff;
  border:none;
}
.adminBox{
  background:#111;
  border:1px solid red;
  padding:10px;
  margin-top:10px;
  color:#ff4444;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="panel">
  <div id="screen">SYSTEM BOOT COMPLETE...<br></div>
  <input id="input" placeholder="Enter command...">
  <button onclick="send()">SEND</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChfStXSUt7iazC3RlF0fKF9H4Mr_BBbBM",
  authDomain: "ahmadai-9afeb.firebaseapp.com",
  projectId: "ahmadai-9afeb",
  storageBucket: "ahmadai-9afeb.firebasestorage.app",
  messagingSenderId: "893222793843",
  appId: "1:893222793843:web:f436a84b54847f8203b006",
  appId: "PUT_YOURS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const statsRef = doc(db,"stats","global");

await setDoc(statsRef,{visitors:0,messages:0,countries:{}},{merge:true});

// تسجيل زيارة
async function registerVisit(){
  await updateDoc(statsRef,{visitors:increment(1)});

  // تحديد الدولة
  try{
    const geo = await fetch("https://ipapi.co/json/");
    const data = await geo.json();
    const country = data.country_name || "Unknown";

    const snap = await getDoc(statsRef);
    let countries = snap.data().countries || {};
    countries[country]=(countries[country]||0)+1;

    await updateDoc(statsRef,{countries});
  }catch{}
}
registerVisit();

window.send = async function(){
  const input=document.getElementById("input");
  const screen=document.getElementById("screen");
  const text=input.value.trim();
  if(!text) return;

  screen.innerHTML+=`<div>> ${text}</div>`;

  // أمر دخول لوحة الأدمن
  if(text==="ahmad"){
    const pass=prompt("Enter admin password:");
    if(pass!=="A2026"){
      alert("Wrong password");
      return;
    }

    const snap=await getDoc(statsRef);
    const data=snap.data();

    screen.innerHTML+=`
      <div class="adminBox">
      <h3>ADMIN PANEL</h3>
      Visitors: ${data.visitors}<br>
      Messages: ${data.messages}<br>
      Countries:<br>
      ${Object.entries(data.countries||{}).map(([c,v])=>c+" : "+v).join("<br>")}
      </div>
    `;
    return;
  }

  // زيادة عداد الرسائل
  await updateDoc(statsRef,{messages:increment(1)});

  // AI محلي ذكي
  let reply="Neural processing...";
  if(text.includes("time")) reply=new Date().toLocaleTimeString();
  else if(text.includes("date")) reply=new Date().toLocaleDateString();
  else if(text.includes("system")) reply="All systems operational.";
  else if(text.includes("owner")) reply="Owner: AHMAD ALMUTAIRI";
  else reply="Command received and analyzed.";

  screen.innerHTML+=`<div>AI: ${reply}</div>`;
  screen.scrollTop=screen.scrollHeight;
  input.value="";
};

document.addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});
</script>

<script>
// MATRIX EFFECT
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;
let letters="01AHMAD$#".split("");
let font=14;
let cols=c.width/font;
let drops=[];
for(let i=0;i<cols;i++)drops[i]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#00f0ff";
  ctx.font=font+"px monospace";
  for(let i=0;i<drops.length;i++){
    let t=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(t,i*font,drops[i]*font);
    if(drops[i]*font>c.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,30);
</script>

</body>
</html>
